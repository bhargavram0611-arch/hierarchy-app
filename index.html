<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="description" content="Organize everything in a hierarchical structure">

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hierarchy">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">

  <title>HierarchyApp</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <button class="btn-icon" id="backBtn" aria-label="Go back" style="display:none"></button>
    <h1 class="header-title" id="headerTitle">My Hierarchy</h1>
    <button class="btn-icon" id="searchBtn" aria-label="Search">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
    </button>
  </header>

  <!-- ── Search Overlay ── -->
  <div class="search-overlay" id="searchOverlay" role="search">
    <div class="search-bar">
      <button class="btn-icon search-back" id="searchCloseBtn" aria-label="Close search">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
      </button>
      <input class="search-input" id="searchInput" type="search"
             placeholder="Search names and notes…" autocomplete="off" autocorrect="off">
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- ── Breadcrumb ── -->
  <nav class="breadcrumb" id="breadcrumb" aria-label="Navigation path"></nav>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📂</div>
      <h2>Nothing here yet</h2>
      <p>Tap <strong>+</strong> to add a category or item</p>
    </div>
    <ul class="item-list" id="itemList" role="list"></ul>
  </main>

  <!-- ── FAB ── -->
  <button class="fab" id="fab" aria-label="Add new">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
      <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
    </svg>
  </button>

  <!-- ── Add Modal ── -->
  <div class="overlay" id="addModal" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
    <div class="modal">
      <h2 class="modal-title" id="addModalTitle">Add New</h2>
      <div class="type-row">
        <button class="type-btn active" id="typeCatBtn">📁 Category</button>
        <button class="type-btn"        id="typeItemBtn">📄 Item</button>
      </div>
      <input class="modal-input" id="addInput" type="text"
             placeholder="Enter name…" maxlength="120" autocomplete="off">
      <div class="modal-actions">
        <button class="btn-ghost"   id="addCancelBtn">Cancel</button>
        <button class="btn-primary" id="addSaveBtn">Add</button>
      </div>
    </div>
  </div>

  <!-- ── Rename Modal ── -->
  <div class="overlay" id="renameModal" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 class="modal-title">Rename</h2>
      <input class="modal-input" id="renameInput" type="text"
             placeholder="New name…" maxlength="120" autocomplete="off">
      <div class="modal-actions">
        <button class="btn-ghost"   id="renameCancelBtn">Cancel</button>
        <button class="btn-primary" id="renameSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Context Menu ── -->
  <div class="ctx-menu" id="ctxMenu" role="menu">
    <button class="ctx-item" id="ctxRename" role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.21a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
      </svg>
      Rename
    </button>
    <div class="ctx-divider"></div>
    <button class="ctx-item danger" id="ctxDelete" role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
      Delete
    </button>
  </div>

  <!-- ── Backdrop (closes context menu) ── -->
  <div class="backdrop" id="backdrop"></div>

  <script src="app.js"></script>
</body>
</html>
